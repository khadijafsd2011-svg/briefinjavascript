<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>Click the button to get time base</p>
    <button onclick="myfunction()">Click to open</button>
    <p id="hour"></p>
    <p id="greeting"></p>
    <script>
        function myfunction() {
            var greeting;
            var time = new Date().getHours()
            if (time < 10) {
                greeting = "goodmorning"
            }
            else if (time < 20) {
                greeting = "goodevening"
            }
            else {
                greeting = "goodnight"
            }
            document.getElementById("hour").innerHTML = "current hour is " + time
            document.getElementById("greeting").innerHTML = greeting
        }
    </script>
</body>

</html>
